

    <div style="padding: 20px; font-family: sans-serif;">
      <h1>Painel da Loja Online (CRUD MEAN + GraphQL)</h1>

        <div style="margin-bottom: 30px; border: 1px solid #ccc; padding: 15px; max-width: 400px;">
          <h3>Adicionar Novo Produto</h3>
          <label>Nome:</label><br>
          <input [(ngModel)]="newProduct.name" type="text" /><br><br>

          <label>Descrição:</label><br>
          <input [(ngModel)]="newProduct.description" type="text" /><br><br>

          <label>Preço:</label><br>
          <input [(ngModel)]="newProduct.price" type="number" /><br><br>

          <label>Estoque:</label><br>
          <input [(ngModel)]="newProduct.stock" type="number" /><br><br>

          <label>URL da Imagem:</label><br>
          <input [(ngModel)]="newProduct.imageUrl" type="text" /><br><br>

          <button (click)="addProduct()">Salvar Produto</button>
        </div>

          <hr>

           <h3>Catálogo de Produtos</h3>
          <div style="display: flex; gap: 20px; flex-wrap: wrap;">
            <div *ngFor="let product of products" style="border: 1px solid #ddd; padding: 15px; width: 200px; border-radius: 5px;">
              <img [src]="product.imageUrl || 'https://via.placeholder.com/150'" alt="Imagem do produto" style="width: 100%; height: auto; max-height: 150px; object-fit: cover;">
              <h4>{{ product.name }}</h4>
              <p>{{ product.description }}</p>
              <p><strong>Preço:</strong> R$ {{ product.price }}</p>
              <p><strong>Estoque:</strong> {{ product.stock }} unid.</p>
              <button (click)="deleteProduct(product)" style="background-color: red; color: white; border: none; padding: 5px 10px; cursor: pointer;">Excluir</button>
              <button (click)="buyProduct(product)" style="background-color: rgb(30, 0, 255); color: white; border: none; padding: 5px 10px; cursor: pointer;">Adiconar ao Carrinho</button>
            </div>
          </div>
    </div>
